<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAFAF7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Биолаб • Карточки">
  <link rel="manifest" href="manifest.json">
  <title>Биолаб • Карточки</title>
  <!-- Markdown парсер -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ... весь предыдущий CSS ... */
    /* Добавляем стили для Markdown */
    .markdown-body {
      font-family: var(--font);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      word-wrap: break-word;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      font-family: var(--font-display);
      margin-top: 24px;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .markdown-body h1 { font-size: 26px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }
    .markdown-body h2 { font-size: 22px; }
    .markdown-body h3 { font-size: 18px; }
    .markdown-body p { margin-bottom: 16px; }
    .markdown-body ul, .markdown-body ol { padding-left: 24px; margin-bottom: 16px; }
    .markdown-body li { margin-bottom: 4px; }
    .markdown-body code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 14px;
    }
    .markdown-body pre {
      background: var(--surface2);
      padding: 16px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }
    .markdown-body pre code {
      background: none;
      padding: 0;
    }
    .markdown-body blockquote {
      border-left: 4px solid var(--lavender-deep);
      padding-left: 16px;
      margin: 16px 0;
      color: var(--text2);
      font-style: italic;
    }
    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .markdown-body th, .markdown-body td {
      border: 1px solid var(--border);
      padding: 10px 12px;
      text-align: left;
    }
    .markdown-body th {
      background: var(--lavender);
      font-weight: 600;
    }
    .markdown-body strong { color: var(--lavender-text); }
    .markdown-body a { color: var(--lavender-deep); }
  </style>
</head>
<body>
  <!-- ... вся предыдущая HTML-структура до скрипта ... -->

  <!-- В деталях пособия изменим блок контента -->
  <div id="guide-detail-screen" class="screen">
    <!-- ... навигация ... -->
    <div class="reader-content">
      <!-- Статистика и теги как раньше -->
      <div class="stats-row" id="guide-stats" style="display:none; margin-bottom:16px">...</div>
      <div class="card-tags" id="guide-tags" style="margin-bottom:16px"></div>
      <div id="guide-chapters-list"></div>
      <!-- НОВОЕ: блок для Markdown контента -->
      <div id="guide-markdown-content" class="markdown-body" style="margin: 20px 0;"></div>
      <!-- Кнопки: если есть url и нет контента, показываем кнопку -->
      <div id="guide-action-buttons" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- ... остальные экраны ... -->

  <script>
    // ... весь предыдущий код до функции openGuide ...

    // Модифицируем openGuide
    function openGuide(id) {
      currentGuideId = id;
      const guide = getGuides().find(g => g.id === id);
      if (!guide) return;
      document.getElementById('guide-detail-title').textContent = guide.name;
      document.getElementById('guide-name').textContent = guide.name;
      document.getElementById('guide-category-label').textContent = { bio: '🧬 Биология', ru: '✍️ Русский язык', phys: '⚗️ Химия / Физика' }[guide.category] || '📖 Пособие';
      document.getElementById('guide-desc').textContent = guide.desc || '';
      document.getElementById('guide-delete-btn').onclick = () => deleteGuide(id);
      document.getElementById('guide-tags').innerHTML = (guide.tags || []).map((t, i) => `<span class="card-tag ${['', 'sage', 'peach', 'sky'][i % 4]}">${t}</span>`).join('');

      // Главы
      const chapters = guide.chapters || [];
      const statsEl = document.getElementById('guide-stats');
      const chapEl = document.getElementById('guide-chapters-list');
      if (chapters.length) {
        statsEl.style.display = '';
        document.getElementById('stat-chapters').textContent = chapters.length;
        document.getElementById('stat-tasks').textContent = chapters.reduce((s, c) => s + (c.tasks || 0), 0);
        chapEl.innerHTML = '';
        chapters.forEach((ch, i) => {
          const item = document.createElement('div');
          item.className = 'chapter-item';
          item.innerHTML = `
            <div class="chapter-num">${i + 1}</div>
            <div class="chapter-info">
              <div class="chapter-name">${ch.title}</div>
              <div class="chapter-tasks">${ch.tasks ? ch.tasks + ' задач' : 'Теория'}</div>
            </div>
            <div class="chapter-arrow">›</div>`;
          chapEl.appendChild(item);
        });
      } else {
        statsEl.style.display = 'none';
        chapEl.innerHTML = '';
      }

      // Рендерим Markdown-контент, если есть
      const mdContainer = document.getElementById('guide-markdown-content');
      const actionsDiv = document.getElementById('guide-action-buttons');
      if (guide.content) {
        // Используем marked для парсинга
        mdContainer.innerHTML = marked.parse(guide.content);
        mdContainer.style.display = 'block';
        // Кнопки: если есть url, показываем дополнительную кнопку "Открыть оригинал"
        if (guide.url) {
          actionsDiv.innerHTML = `<button class="btn btn-secondary" onclick="openGuideUrl()">🔗 Открыть оригинал (PDF/Google Docs)</button>`;
        } else {
          actionsDiv.innerHTML = '';
        }
      } else {
        mdContainer.style.display = 'none';
        if (guide.url) {
          actionsDiv.innerHTML = `<button class="btn btn-primary" onclick="openGuideUrl()">📖 Открыть пособие</button>`;
        } else {
          actionsDiv.innerHTML = '';
        }
      }

      showScreen('guide-detail-screen');
    }

    // ... остальной код без изменений ...
  </script>
</body>
</html>
